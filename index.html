<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Markdown viewer demo</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            html {
                -webkit-text-size-adjust: 100%;
                height: 100%;
            }
            body {
                margin: 0;
                min-height: 100%;
                font-family: system-ui, "Segoe UI", Roboto, sans-serif;
            }
            #app.markdown-view-demo-root {
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }
            #app.markdown-view-demo-root > .cw-view-viewer-shell {
                flex: 1 1 auto;
                min-height: 0;
            }
            [data-demo-hint],
            [data-demo-status] {
                font-size: 0.82rem;
                padding: 0.35rem 0.75rem;
                color: #64748b;
            }
            [data-demo-hint] a {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 2px;
            }
            html[data-theme="dark"] [data-demo-hint],
            html[data-theme="dark"] [data-demo-status] {
                color: #94a3b8;
            }
        </style>
    </head>
    <body>
        <p data-demo-hint>
            <strong>Markdown viewer</strong> — drop .md anywhere, paste text or files,
            toolbar <kbd>Open</kbd>, or load by URL query
            <a href="./?path=/demo/sample.md"><code>?path=/demo/sample.md</code></a>
        </p>
        <main id="app" class="markdown-view-demo-root"></main>
        <p data-demo-status aria-live="polite"></p>
        <script type="module" src="/demo/boot.ts"></script>
    </body>
</html>
